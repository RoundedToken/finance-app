name = "finances-worker"
main = "src/index.ts"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]
account_id = "121eac1ba4e295b54152de288b8036e9"

# Минимально-возможное consumption (free tier)
# usage_model = "bundled"  # default — оставим

[observability]
enabled = true

# D1 binding — database_id заполнить после `wrangler d1 create finances-outbox`
[[d1_databases]]
binding = "DB"
database_name = "finances-outbox"
database_id = "36fbd044-7524-4ac5-9c8d-8d0a5679fee5"

# Cron Trigger удалён — после D1-centric pivot outbox не существует.
# [triggers]
# crons = []

# Secrets устанавливаются через `wrangler secret put`:
#   TELEGRAM_BOT_TOKEN
#   SYNC_TOKEN
# Они НЕ перечисляются здесь.
