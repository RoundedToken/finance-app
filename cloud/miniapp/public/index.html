<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no, interactive-widget=overlays-content">
    <title>Finances</title>
    <link rel="stylesheet" href="styles.css?v=9">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
    <div id="app">
        <!-- ───────────── Main ───────────── -->
        <section class="screen" id="screen-main">
            <header class="topbar">
                <button class="iconbtn" id="open-menu" aria-label="меню">☰</button>
                <div class="display">
                    <span class="display-amount" id="amount-display">0</span>
                    <span class="display-currency">
                        <span id="display-flag">🇷🇸</span>
                        <span id="currency-display">RSD</span>
                    </span>
                </div>
                <button class="iconbtn" id="open-history" aria-label="История">📜</button>
            </header>

            <div class="numpad" id="numpad">
                <button class="num">1</button>
                <button class="num">2</button>
                <button class="num">3</button>
                <button class="num">4</button>
                <button class="num">5</button>
                <button class="num">6</button>
                <button class="num">7</button>
                <button class="num">8</button>
                <button class="num">9</button>
                <button class="num" data-key="dot">.</button>
                <button class="num">0</button>
                <button class="num" data-key="back">⌫</button>
            </div>

            <div class="side-actions">
                <button class="sidebtn" id="open-currency"><span id="side-flag">🇷🇸</span><span id="side-currency">RSD</span></button>
                <button class="sidebtn" id="open-date">📅<span id="side-date">сегодня</span></button>
                <button class="sidebtn" id="open-note">💬<span id="side-note-indicator">описание</span></button>
            </div>

            <div class="categories">
                <div class="categories-viewport">
                    <div class="categories-track" id="cat-track"></div>
                </div>
                <div class="pager" id="categories-pager"></div>
            </div>

            <div class="recent-days" id="recent-days"></div>
        </section>

        <!-- ───────────── Stats ───────────── -->
        <section class="screen" id="screen-stats" hidden>
            <header class="topbar">
                <button class="iconbtn back-btn" data-back>←</button>
                <h1>Статистика</h1>
                <span class="iconbtn-placeholder"></span>
            </header>

            <div class="stats-period">
                <button class="iconbtn period-nav" id="stats-prev" aria-label="назад">‹</button>
                <span class="period-label" id="stats-period-label">…</span>
                <button class="iconbtn period-nav" id="stats-next" aria-label="вперёд">›</button>
            </div>
            <div class="stats-tabs" id="stats-tabs">
                <button data-period="week">Нед</button>
                <button data-period="month" class="active">Мес</button>
                <button data-period="year">Год</button>
                <button data-period="all">Всё</button>
            </div>

            <div class="stats-kpi" id="stats-kpi"></div>

            <div class="stats-donut" id="stats-donut"></div>

            <div class="stats-cats" id="stats-cats"></div>

            <div class="stats-trend">
                <div class="stats-trend-head">
                    <span id="stats-trend-title">Тренд</span>
                    <span id="stats-trend-meta" class="stats-trend-meta"></span>
                </div>
                <div class="stats-trend-chart" id="stats-trend-chart"></div>
                <div class="stats-trend-axis" id="stats-trend-axis"></div>
            </div>
        </section>

        <!-- ───────────── Stats: drilldown ───────────── -->
        <section class="modal" id="modal-stats-detail" hidden>
            <div class="modal-backdrop" data-close></div>
            <div class="modal-card">
                <h2 id="stats-detail-title">Категория</h2>
                <div class="info-strip" id="stats-detail-meta"></div>
                <ul class="day-rows" id="stats-detail-list"></ul>
            </div>
        </section>

        <!-- ───────────── History ───────────── -->
        <section class="screen" id="screen-history" hidden>
            <header class="topbar">
                <button class="iconbtn back-btn" data-back>←</button>
                <h1>История</h1>
                <span class="iconbtn-placeholder"></span>
            </header>
            <div class="history-list" id="history-list">
                <p class="history-hint">Загрузка…</p>
            </div>
        </section>

        <!-- ───────────── Menu ───────────── -->
        <section class="modal" id="modal-menu" hidden>
            <div class="modal-backdrop" data-close></div>
            <div class="modal-card">
                <h2>Меню</h2>
                <button class="row" data-go="history">📜 История</button>
                <button class="row" data-go="stats">📊 Статистика</button>
                <button class="row" id="open-settings">⚙️ Настройки</button>
            </div>
        </section>

        <!-- ───────────── Settings ───────────── -->
        <section class="modal" id="modal-settings" hidden>
            <div class="modal-backdrop" data-close></div>
            <div class="modal-card">
                <h2>Настройки</h2>
                <div class="edit-block">
                    <span class="label">Базовая валюта <small style="color:var(--hint);">для итогов и аналитики</small></span>
                    <div class="currency-grid" id="settings-base-grid"></div>
                </div>
                <div class="info-strip" id="settings-rates-info"></div>
            </div>
        </section>

        <!-- ───────────── Currency picker ───────────── -->
        <section class="modal" id="modal-currency" hidden>
            <div class="modal-backdrop" data-close></div>
            <div class="modal-card">
                <h2>Валюта</h2>
                <div class="currency-grid" id="currency-grid"></div>
            </div>
        </section>

        <!-- ───────────── Date picker ───────────── -->
        <section class="modal" id="modal-date" hidden>
            <div class="modal-backdrop" data-close></div>
            <div class="modal-card">
                <h2>Дата</h2>
                <button class="row" data-date-shift="0">Сегодня</button>
                <button class="row" data-date-shift="-1">Вчера</button>
                <button class="row" data-date-shift="-2">Позавчера</button>
                <label class="date-manual">
                    <span>другая</span>
                    <input type="date" id="date-input">
                </label>
            </div>
        </section>

        <!-- ───────────── Note editor ───────────── -->
        <section class="modal" id="modal-note" hidden>
            <div class="modal-backdrop" data-close></div>
            <div class="modal-card">
                <h2>Описание покупки</h2>
                <textarea id="note-input" rows="3" placeholder="Введите описание своей покупки"></textarea>
                <div class="row-actions">
                    <button class="ghost" id="note-clear">Очистить</button>
                    <button class="primary" id="note-save">OK</button>
                </div>
            </div>
        </section>

        <!-- ───────────── Edit expense ───────────── -->
        <section class="modal" id="modal-edit" hidden>
            <div class="modal-backdrop" data-close></div>
            <div class="modal-card" id="edit-card">
                <h2 id="edit-title">Редактировать</h2>

                <div class="edit-block inline">
                    <span class="label">Сумма</span>
                    <input type="number" id="edit-amount" inputmode="decimal" step="any" min="0">
                </div>
                <div class="edit-block inline">
                    <span class="label">Валюта</span>
                    <select id="edit-currency"></select>
                </div>
                <div class="edit-block inline edit-block-date">
                    <span class="label">Дата</span>
                    <input type="date" id="edit-date">
                </div>

                <div class="edit-block">
                    <span class="label">Описание</span>
                    <textarea id="edit-note" rows="2" placeholder="Введите описание своей покупки"></textarea>
                </div>
                <div class="edit-block">
                    <span class="label">Категория</span>
                    <div class="cat-mini-grid" id="edit-cat-grid"></div>
                </div>

                <div class="row-actions">
                    <button class="danger" id="edit-delete">Удалить</button>
                    <button class="primary" id="edit-save">Сохранить</button>
                </div>
            </div>
        </section>

        <!-- ───────────── Toast ───────────── -->
        <div class="toast" id="toast" hidden></div>
    </div>

    <script type="module" src="app.js?v=9"></script>
</body>
</html>
